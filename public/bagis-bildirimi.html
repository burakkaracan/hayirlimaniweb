<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bağış Bildirimi Alındı — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <div class="container">
    <div class="payment-card text-center">
      <div style="font-size:5rem; margin-bottom:10px;">✅</div>
      <h1 style="color:var(--brand-dark);">Bağış Bildiriminiz Alındı</h1>
      <p class="intro" style="margin-top:16px;">
        Bağış bildiriminiz kontrol ediliyor. Onaylandığında mail ile bilgilendirileceksiniz.
        Katkınız için teşekkür ederiz. Her mazlumun kıyısında… birlikte olmanın gücüyle.
      </p>
      <div style="background:var(--bg); padding:20px; border-radius:var(--radius); margin:24px 0;">
        <div class="muted" style="font-size:.85rem; text-transform:uppercase; letter-spacing:2px;">Bekliyorsunuz</div>
        <div id="countdown" style="font-size:3rem; font-weight:800; color:var(--brand);">5</div>
        <div class="muted" style="font-size:.9rem;" id="redirect-text">saniye sonra yönlendirileceksiniz…</div>
      </div>
      <a href="/" class="btn btn-outline">Ana Sayfaya Dön</a>
      <a href="/profil.html?sekme=bagislarim" class="btn btn-primary">Bağışlarım</a>
    </div>
  </div>

  <footer id="site-footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    window.addEventListener('app-ready', () => {
      const target = currentUser ? '/profil.html?sekme=bagislarim' : '/';
      document.getElementById('redirect-text').textContent = currentUser
        ? 'saniye sonra bağışlarım sayfasına yönlendirileceksiniz…'
        : 'saniye sonra ana sayfaya yönlendirileceksiniz…';
      let n = 5;
      const el = document.getElementById('countdown');
      const t = setInterval(() => {
        n--;
        el.textContent = n;
        if (n <= 0) { clearInterval(t); location.href = target; }
      }, 1000);
    });
  </script>
</body>
</html>
