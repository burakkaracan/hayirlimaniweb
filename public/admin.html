<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: var(--bg); padding-top: 0; }
    .data-form { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .data-form .wide { grid-column: 1 / -1; }
    .data-form label { display: block; margin-bottom: 4px; font-weight: 600; font-size: .85rem; }
    .data-form input, .data-form textarea, .data-form select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); background: #fff;
    }
    .data-form input[type="checkbox"] { width: auto; padding: 0; border: none; background: none; vertical-align: middle; }
    .data-form label:has(input[type="checkbox"]) { display: flex; align-items: center; gap: 8px; margin-bottom: 0; font-weight: 500; cursor: pointer; }
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
    .flex-spacer { flex: 1; }
    .chat-thread { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; padding: 12px; background: var(--bg); border-radius: var(--radius); margin-bottom: 12px; }
    .tab-bar { display: flex; gap: 2px; background: #fff; padding: 4px; border-radius: var(--radius); margin-bottom: 20px; overflow-x: auto; }
    .tab-bar button { padding: 10px 16px; border-radius: 8px; font-weight: 600; color: var(--muted); white-space: nowrap; }
    .tab-bar button.active { background: var(--brand); color: #fff; }
    .msg-filter-bar { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .msg-chip { padding: 5px 14px; border-radius: 999px; font-size: .85rem; font-weight: 600; border: 1.5px solid var(--border); background: #fff; color: var(--muted); cursor: pointer; transition: all .15s; }
    .msg-chip:hover { border-color: var(--brand); color: var(--brand); }
    .msg-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
    .msg-thread-item { transition: background .12s; }
    .msg-thread-item:hover { background: var(--bg); }
    .chart-range-bar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
    .chart-range-bar button { padding:6px 14px; border-radius:6px; font-size:.82rem; font-weight:600; border:1.5px solid var(--border); background:#fff; color:var(--muted); cursor:pointer; transition:all .15s; }
    .chart-range-bar button.active, .chart-range-bar button:hover { border-color:var(--brand); color:var(--brand); background:#f0fdfa; }
    .chart-range-bar input[type=date] { padding:5px 10px; border:1.5px solid var(--border); border-radius:6px; font-size:.82rem; color:var(--text); }
    .chart-range-bar .sep { color:var(--muted); font-size:.85rem; }
    @media (max-width: 820px) {
      .data-form { grid-template-columns: 1fr !important; }
      .chart-range-bar .sep { display: none; }
      .admin-head h2 { font-size: 1.2rem; }
      table { font-size: .82rem; }
      table th, table td { padding: 8px 6px; }
      .btn-sm { padding: 5px 8px; font-size: .75rem; }
    }
  </style>
</head>
<body>
  <div id="admin-root">
    <div class="loader">Yükleniyor…</div>
  </div>

  <div class="modal-backdrop" id="modal"><div class="modal" id="modal-body"></div></div>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.0/dist/apexcharts.min.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
