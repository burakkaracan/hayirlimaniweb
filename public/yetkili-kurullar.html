<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yetkili Kurullar — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <section class="page-hero">
    <div class="container">
      <h1>Yetkili <span class="heading-accent">Kurullar</span></h1>
      <div class="breadcrumb"><a href="/">Anasayfa</a> / Kurumsal / Yetkili Kurullar</div>
    </div>
  </section>

  <div class="container section">
    <div class="card" id="boards-container">
      <div class="loader">Yükleniyor…</div>
    </div>
  </div>

  <div id="pre-footer-cta"></div>
  <footer id="site-footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    window.addEventListener('app-ready', async () => {
      const rows = await api('/api/boards');
      const groups = {};
      rows.forEach(r => { (groups[r.board_name] = groups[r.board_name] || []).push(r); });
      const container = document.getElementById('boards-container');
      if (!rows.length) return container.innerHTML = '<div class="empty">Henüz kurul bilgisi eklenmedi.</div>';
      container.innerHTML = Object.entries(groups).map(([name, people]) => `
        <div class="board-section">
          <h3>${name}</h3>
          <ul class="board-list">
            ${people.map(p => `<li><span class="name">${p.person_name}</span><span class="role">${p.role}</span></li>`).join('')}
          </ul>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
