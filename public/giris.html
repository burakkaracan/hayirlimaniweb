<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <div class="container">
    <div class="form-card">
      <h1>Giriş Yap</h1>
      <div class="form-msg" id="form-msg"></div>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" name="email" required autofocus />
        </div>
        <div class="form-group">
          <label>Parola</label>
          <input type="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Giriş Yap</button>
        <div class="form-foot">
          Henüz hesabınız yok mu? <a href="/kayit.html">Kayıt olun</a>
        </div>
      </form>
      <div class="form-foot" style="border-top:1px solid var(--border); padding-top:16px; margin-top:20px; font-size:.8rem;">
        <strong>Demo hesaplar:</strong><br>
        admin@hayirlimani.com / admin123<br>
        bagisci@ornek.com / bagisci123
      </div>
    </div>
  </div>

  <footer id="site-footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    async function doLogin(e) {
      e.preventDefault();
      const f = e.target;
      const msg = document.getElementById('form-msg');
      const r = await api('/api/login', {
        method: 'POST',
        body: { email: f.email.value, password: f.password.value }
      });
      if (r.ok) {
        location.href = r.role === 'admin' || r.role === 'staff' ? '/admin.html' : '/profil.html';
      } else {
        msg.className = 'form-msg error';
        msg.textContent = r.error || 'Giriş başarısız';
      }
    }
  </script>
</body>
</html>
