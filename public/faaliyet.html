<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faaliyet Detayı — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/images/icon.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <div class="container section">
    <div id="content"><div class="loader">Yükleniyor…</div></div>
  </div>

  <div id="pre-footer-cta"></div>
  <footer id="site-footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    window.addEventListener('app-ready', async () => {
      const slug = qs('slug');
      const content = document.getElementById('content');
      if (!slug) { content.innerHTML = '<div class="empty">Faaliyet bulunamadı</div>'; return; }
      let item = null;
      try { item = await api('/api/activities/' + slug); } catch (e) {}
      if (!item || item.error) {
        try { item = await api('/api/campaigns/' + slug); } catch (e) {}
      }
      if (!item || item.error) { content.innerHTML = '<div class="empty">İçerik bulunamadı</div>'; return; }

      const bg = item.cover_image ? `background-image:url('${item.cover_image}')` : '';
      const isCampaign = 'goal' in item;
      const pct = isCampaign && item.goal > 0 ? Math.min(100, Math.round((item.raised / item.goal) * 100)) : 0;

      content.innerHTML = `
        <div class="breadcrumb muted" style="margin-bottom:20px;"><a href="/">Anasayfa</a> / <a href="/faaliyetler.html">Faaliyetler</a> / ${item.title}</div>
        <div class="detail-cover" style="${bg}"></div>
        <div class="detail-layout">
          <div>
            <h1>${item.title}</h1>
            <div class="muted" style="margin:12px 0 20px;">
              ${item.location ? '📍 ' + item.location : ''}
              ${item.date ? ' · 📅 ' + item.date : ''}
            </div>
            ${isCampaign ? `
              <div style="background:var(--bg); padding:20px; border-radius:var(--radius); margin-bottom:20px;">
                <div class="progress"><div class="fill" style="width:${pct}%"></div></div>
                <div class="campaign-stats">
                  <div><strong>${formatTL(item.raised)}</strong><span>Toplanan</span></div>
                  <div><strong>${formatTL(item.goal)}</strong><span>Hedef</span></div>
                  <div><strong>${formatNumber(item.donor_count)}</strong><span>Bağışçı</span></div>
                </div>
              </div>` : ''}
            <div class="detail-body">
              ${(item.body || item.summary || item.short_description || '').split('\n').map(p => `<p>${escapeHtml(p)}</p>`).join('')}
            </div>
          </div>
          <aside>
            <div class="donate-box">
              <h3>Bu ${isCampaign ? 'kampanyaya' : 'çalışmaya'} <span class="heading-accent">destek olun</span></h3>
              <p class="muted" style="margin-bottom:16px;">Bağışınız doğrudan bu projenin fonuna aktarılır.</p>
              <div class="amounts" style="grid-template-columns:1fr 1fr;">
                <button class="amount-btn" data-val="250">250 ₺</button>
                <button class="amount-btn" data-val="500">500 ₺</button>
                <button class="amount-btn" data-val="1000">1000 ₺</button>
                <button class="amount-btn" data-val="2500">2500 ₺</button>
              </div>
              <div class="amount-custom" style="margin-top:12px;">
                <input type="number" id="camp-amount" placeholder="Tutar (₺)" />
              </div>
              <button class="btn btn-primary btn-block btn-lg mt-4" onclick="donateToItem('${isCampaign ? 'campaign' : 'activity'}', ${item.id}, '${item.slug}')">Bağış Yap</button>
            </div>
          </aside>
        </div>
      `;
      document.querySelectorAll('.amount-btn').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.amount-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          document.getElementById('camp-amount').value = b.dataset.val;
        });
      });
    });

    function donateToItem(kind, id, slug) {
      const amt = document.getElementById('camp-amount').value;
      if (!amt || amt <= 0) return alert('Lütfen bir tutar girin');
      const p = new URLSearchParams({ tutar: amt });
      if (kind === 'campaign') p.set('kampanya', id);
      location.href = '/bagis-yap.html?' + p.toString();
    }
  </script>
</body>
</html>
