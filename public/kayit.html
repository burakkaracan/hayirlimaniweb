<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kayıt Ol — Hayır Limanı Derneği</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <div class="container">
    <div class="form-card">
      <h1>Bağışçı Kaydı</h1>
      <p class="muted text-center" style="margin-bottom:20px;">Kaydolun, bağış geçmişinizi ve makbuzlarınızı tek yerden takip edin.</p>
      <div class="form-msg" id="form-msg"></div>
      <form onsubmit="doRegister(event)">
        <div class="form-group">
          <label>Ad Soyad</label>
          <input type="text" name="name" required autofocus />
        </div>
        <div class="form-group">
          <label>E-posta</label>
          <input type="email" name="email" required />
        </div>
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" name="phone" placeholder="0555 000 00 00" />
        </div>
        <div class="form-group">
          <label>Parola</label>
          <input type="password" name="password" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg"><svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Kayıt Ol</button>
        <div class="form-foot">
          Zaten hesabınız var mı? <a href="/giris.html">Giriş yapın</a>
        </div>
      </form>
    </div>
  </div>

  <footer id="site-footer" class="footer"></footer>
  <script src="/js/main.js"></script>
  <script>
    async function doRegister(e) {
      e.preventDefault();
      const f = e.target;
      const msg = document.getElementById('form-msg');
      const r = await api('/api/register', {
        method: 'POST',
        body: { name: f.name.value, email: f.email.value, phone: f.phone.value, password: f.password.value }
      });
      if (r.ok) {
        msg.className = 'form-msg success';
        msg.textContent = 'Kayıt başarılı. Yönlendiriliyorsunuz…';
        setTimeout(() => location.href = '/profil.html', 800);
      } else {
        msg.className = 'form-msg error';
        msg.textContent = r.error || 'Kayıt başarısız';
      }
    }
  </script>
</body>
</html>
